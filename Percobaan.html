<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Lengkap - Aneka Sosis</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #8B0000;
            --secondary: #EAB308;
            --light: #FFFBF0;
            --dark: #1A1A1A;
            --accent: #25d366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--light); color: var(--dark); }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        
        .header-menu { text-align: center; margin-bottom: 50px; }
        .header-menu h1 { color: var(--primary); font-size: 2.5rem; text-transform: uppercase; letter-spacing: 2px; }
        .header-menu p { color: #666; font-style: italic; }

        /* --- STYLE TOMBOL KEMBALI --- */
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 20px;
            transition: 0.3s;
            padding: 8px 16px;
            border: 2px solid var(--primary);
            border-radius: 50px;
        }
        .btn-back:hover {
            background: var(--primary);
            color: white;
        }

        /* Grid System untuk 18 Menu */
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 25px; 
        }

        .p-card { 
            background: white; 
            border-radius: 20px; 
            padding: 15px; 
            text-align: center; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); 
            transition: 0.3s; 
            border: 1px solid rgba(139, 0, 0, 0.1);
        }

        .p-card:hover { transform: translateY(-10px); border-color: var(--secondary); }
        
        .img-container { 
            width: 100%; 
            height: 180px; 
            border-radius: 15px; 
            overflow: hidden; 
            margin-bottom: 15px; 
            background: #eee;
        }

        .p-card img { width: 100%; height: 100%; object-fit: cover; }

        .p-card h3 { font-size: 1.1rem; margin-bottom: 5px; color: var(--dark); }
        
        .price { 
            color: var(--primary); 
            font-weight: 800; 
            font-size: 1.2rem; 
            display: block; 
            margin-bottom: 15px; 
        }

        .btn-buy { 
            width: 100%; 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 10px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 700; 
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-buy:hover { background: var(--dark); color: var(--secondary); }

        .badge-new {
            position: absolute;
            background: var(--secondary);
            color: var(--dark);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 800;
            top: 10px;
            right: 10px;
        }

        @media (max-width: 600px) {
            .product-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .p-card { padding: 10px; }
            .p-card h3 { font-size: 0.9rem; }
            .price { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="Coba.html" class="btn-back">
            <i class="fas fa-arrow-left"></i> Kembali ke Home
        </a>

        <div class="header-menu">
            <h1>Daftar Menu Kami</h1>
            <p>Pilih favoritmu dan rasakan kelezatannya!</p>
        </div>

        <div class="product-grid" id="menuContainer">
            </div>
    </div>

    <script>
        // DATA MENU (Silahkan ganti Link Gambar dan Harga di sini)
        const menus = [
            { n: "Bratwurst Jumbo", p: 15000, img: "https://via.placeholder.com/300x200?text=Bratwurst" },
            { n: "Mozzarella Bomb", p: 18000, img: "https://via.placeholder.com/300x200?text=Mozzarella" },
            { n: "Black Pepper", p: 17000, img: "https://via.placeholder.com/300x200?text=Black+Pepper" },
            { n: "Cheesy Frank", p: 16000, img: "https://via.placeholder.com/300x200?text=Cheese" },
            { n: "Hot Volcano", p: 17000, img: "https://via.placeholder.com/300x200?text=Volcano" },
            { n: "Original Grill", p: 12000, img: "https://via.placeholder.com/300x200?text=Original" },
            { n: "Sosis Cocktail", p: 10000, img: "https://via.placeholder.com/300x200?text=Cocktail" },
            { n: "German Bockwurst", p: 20000, img: "https://via.placeholder.com/300x200?text=German" },
            { n: "Smoky BBQ", p: 16000, img: "https://via.placeholder.com/300x200?text=BBQ" },
            { n: "Chicken Garlic", p: 14000, img: "https://via.placeholder.com/300x200?text=Garlic" },
            { n: "Beef Italian", p: 17000, img: "https://via.placeholder.com/300x200?text=Italian" },
            { n: "Sweet Honey", p: 15000, img: "https://via.placeholder.com/300x200?text=Honey" },
            { n: "Crispy Sosis", p: 13000, img: "https://via.placeholder.com/300x200?text=Crispy" },
            { n: "Mini Slider", p: 11000, img: "https://via.placeholder.com/300x200?text=Mini" },
            { n: "Sosis Gulung Mie", p: 8000, img: "https://via.placeholder.com/300x200?text=Noodle" },
            { n: "Double Cheese", p: 19000, img: "https://via.placeholder.com/300x200?text=Double" },
            { n: "Spicy Mexican", p: 17500, img: "https://via.placeholder.com/300x200?text=Mexican" },
            { n: "King Size", p: 25000, img: "https://via.placeholder.com/300x200?text=King" }
        ];

        const container = document.getElementById('menuContainer');

        menus.forEach(menu => {
            container.innerHTML += `
                <div class="p-card" style="position: relative;">
                    <div class="img-container">
                        <img src="${menu.img}" alt="${menu.n}">
                    </div>
                    <h3>${menu.n}</h3>
                    <span class="price">Rp ${menu.p.toLocaleString()}</span>
                    <button class="btn-buy" onclick="alert('Memesan ${menu.n}')">
                        <i class="fab fa-whatsapp"></i> Pesan
                    </button>
                </div>
            `;
        });
    </script>
</body>
</html>
