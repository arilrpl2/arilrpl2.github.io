<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Lengkap - Aneka Sosis</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #8B0000;
            --secondary: #EAB308;
            --light: #FFFBF0;
            --dark: #1A1A1A;
            --accent: #25d366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--light); color: var(--dark); }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        
        .header-menu { text-align: center; margin-bottom: 50px; }
        .header-menu h1 { color: var(--primary); font-size: 2.5rem; text-transform: uppercase; letter-spacing: 2px; }
        .header-menu p { color: #666; font-style: italic; }

        /* Statistik Pengunjung */
        .visitor-stat {
            background: var(--dark);
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 20px;
            transition: 0.3s;
            padding: 8px 16px;
            border: 2px solid var(--primary);
            border-radius: 50px;
        }
        .btn-back:hover { background: var(--primary); color: white; }

        /* Grid System */
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 25px; 
        }

        .p-card { 
            background: white; 
            border-radius: 20px; 
            padding: 15px; 
            text-align: center; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); 
            transition: 0.3s; 
            border: 1px solid rgba(139, 0, 0, 0.1);
        }

        .p-card:hover { transform: translateY(-10px); border-color: var(--secondary); }
        
        .img-container { 
            width: 100%; height: 180px; border-radius: 15px; overflow: hidden; margin-bottom: 15px; 
        }
        .p-card img { width: 100%; height: 100%; object-fit: cover; }

        .sold-badge {
            background: #f0f0f0;
            color: #666;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-bottom: 10px;
            display: inline-block;
        }

        .price { color: var(--primary); font-weight: 800; font-size: 1.2rem; display: block; margin-bottom: 15px; }

        .btn-buy { 
            width: 100%; background: var(--primary); color: white; border: none; padding: 12px; 
            border-radius: 10px; cursor: pointer; font-weight: 700; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-buy:hover { background: var(--dark); color: var(--secondary); }

        /* MODAL STYLES (Sesuai kode yang diminta) */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 3000; padding: 20px; backdrop-filter: blur(5px); }
        .modal.show { display: flex; }
        .modal-content { background: white; border-radius: 30px; width: 100%; max-width: 480px; max-height: 95vh; overflow-y: auto; position: relative; }
        .modal-header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        .modal-body { padding: 25px; }
        .form-group { margin-bottom: 12px; text-align: left; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 5px; }
        .form-input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; outline: none; }
        .qty-control { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 15px 0; background: #f9f9f9; padding: 10px; border-radius: 12px; }
        .qty-btn { background: var(--primary); color: white; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; }
        .total-box { background: var(--dark); color: white; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin: 15px 0; }

        .payment-methods { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px; }
        .pay-option { 
            border: 2px solid #eee; border-radius: 10px; padding: 8px; text-align: center; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 600; font-size: 0.85rem;
        }
        .pay-option.selected { border-color: var(--primary); background: #fdf2f2; color: var(--primary); }

        @media (max-width: 600px) {
            .product-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .p-card h3 { font-size: 0.9rem; }
            .price { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="Coba.html" class="btn-back"><i class="fas fa-arrow-left"></i> Kembali ke Home</a>
        
        <div style="text-align: center;">
            <div class="visitor-stat">
                <i class="fas fa-users"></i> Total Pengunjung: <span id="totalVisits">0</span>
            </div>
        </div>

        <div class="header-menu">
            <h1>Daftar Menu Kami</h1>
            <p>Pilih favoritmu dan rasakan kelezatannya!</p>
        </div>

        <div class="product-grid" id="menuContainer"></div>
    </div>

    <div id="orderModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h2 id="mTitle">Produk</h2></div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Jumlah Pesanan (Maks. 10)</label>
                    <div class="qty-control">
                        <button class="qty-btn" onclick="updateQty(-1)">-</button>
                        <span id="qtyVal" style="font-size:1.5rem; font-weight:800;">1</span>
                        <button class="qty-btn" onclick="updateQty(1)">+</button>
                    </div>
                </div>
                <div class="form-group"><label>Level Kepedasan</label>
                    <select id="mPedas" class="form-input">
                        <option>Tidak Pedas</option><option>Level 1</option><option>Level 2</option><option>Level 3</option>
                    </select>
                </div>
                <div class="form-group"><label>Nama Pemesan</label><input type="text" id="mNama" class="form-input" placeholder="Nama lengkap"></div>
                <div class="form-group"><label>Alamat Lengkap</label><input type="text" id="mAlamat" class="form-input" placeholder="Alamat pengiriman"></div>
                <div class="form-group">
                    <label>Topping (+Rp 2.000)</label>
                    <select id="mTop" class="form-input" onchange="calcTotal()">
                        <option value="0">Tanpa Topping</option>
                        <option value="2000">Extra Keju</option>
                        <option value="2000">Extra Mayo</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Metode Pembayaran</label>
                    <div class="payment-methods">
                        <div class="pay-option selected" onclick="selectPayment(this, 'Tunai / COD')"><i class="fas fa-money-bill-wave"></i> Tunai</div>
                        <div class="pay-option" onclick="selectPayment(this, 'DANA')"><i class="fas fa-wallet"></i> DANA</div>
                        <div class="pay-option" onclick="selectPayment(this, 'OVO')"><i class="fas fa-mobile-alt"></i> OVO</div>
                        <div class="pay-option" onclick="selectPayment(this, 'GoPay')"><i class="fas fa-coins"></i> GoPay</div>
                    </div>
                </div>
                <div class="form-group"><label>Catatan Khusus</label><textarea id="mCatatan" class="form-input" placeholder="Contoh: Saus dipisah..." style="height:60px; resize:none;"></textarea></div>
                <div class="total-box"><span>Total:</span><strong id="mTotal">Rp 0</strong></div>
                <button class="btn-buy" style="background:var(--accent);" onclick="triggerPurchase()"><i class="fab fa-whatsapp"></i> Pesan Sekarang</button>
                <p style="text-align:center; cursor:pointer; margin-top:10px; color:gray;" onclick="closeModal()">Batal</p>
            </div>
        </div>
    </div>

    <script>
        const menus = [
            { id: "s1", n: "Bratwurst Jumbo", p: 15000, img: "sosisbratwus.jpeg" },
            { id: "s2", n: "Mozzarella Bomb", p: 18000, img: "sosiskeju.jpeg" },
            { id: "s3", n: "Black Pepper", p: 17000, img: "sosisblack.jpeg" },
            { id: "s4", n: "Cheesy Frank", p: 16000, img: "sosischesy.jpg" },
            { id: "s5", n: "Hot Volcano", p: 17000, img: "sosishot.jpeg" },
            { id: "s6", n: "Original Grill", p: 12000, img: "sosisori.jpeg" },
            { id: "s7", n: "Sosis Cocktail", p: 10000, img: "sosiscocktail.jpeg" },
            { id: "s8", n: "German Bockwurst", p: 20000, img: "sosisjerman.jpeg" },
            { id: "s9", n: "Smoky BBQ", p: 16000, img: "sosisbbq.jpeg" },
            { id: "s10", n: "Chicken Garlic", p: 14000, img: "sosisgarlic.jpeg" },
            { id: "s11", n: "Beef Italian", p: 17000, img: "sosisitalia.png" },
            { id: "s12", n: "Sweet Honey", p: 15000, img: "sosishoney.jpeg" },
            { id: "s13", n: "Crispy Sosis", p: 13000, img: "sosiscrispy.jpg" },
            { id: "s14", n: "sosis jumbo", p: 11000, img: "sosisjumbo.jpeg" },
            { id: "s15", n: "Sosis Gulung Mie", p: 8000, img: "sosisgulung.jpeg" },
            { id: "s16", n: "Double Cheese", p: 19000, img: "sosischese.jpeg" },
            { id: "s17", n: "Spicy Mexican", p: 17500, img: "sosisspicy.webp" },
            { id: "s18", n: "sosis sapi goreng", p: 25000, img: "sosissapi.png" }
        ];

        let currentProduct = null;
        let currentQty = 1;
        let selectedPayment = "Tunai / COD";

        // Inisialisasi Visitor & Menu
        window.onload = () => {
            let visits = localStorage.getItem('totalVisitsMenu') || 0;
            visits++;
            localStorage.setItem('totalVisitsMenu', visits);
            document.getElementById('totalVisits').innerText = visits;

            renderMenu();
        };

        function renderMenu() {
            const container = document.getElementById('menuContainer');
            container.innerHTML = '';
            menus.forEach(menu => {
                let sold = localStorage.getItem('sold_' + menu.id) || 0;
                container.innerHTML += `
                    <div class="p-card">
                        <div class="img-container"><img src="${menu.img}" alt="${menu.n}"></div>
                        <div class="sold-badge"><i class="fas fa-shopping-basket"></i> Terjual: <span id="stat-${menu.id}">${sold}</span></div>
                        <h3>${menu.n}</h3>
                        <span class="price">Rp ${menu.p.toLocaleString()}</span>
                        <button class="btn-buy" onclick="openOrder('${menu.id}', '${menu.n}', ${menu.p})">
                            <i class="fab fa-whatsapp"></i> Pesan
                        </button>
                    </div>`;
            });
        }

        function openOrder(id, name, price) {
            currentProduct = { id, name, price };
            currentQty = 1;
            document.getElementById('mTitle').innerText = name;
            document.getElementById('qtyVal').innerText = 1;
            document.getElementById('mTop').value = "0";
            document.getElementById('orderModal').classList.add('show');
            calcTotal();
        }

        function closeModal() { document.getElementById('orderModal').classList.remove('show'); }

        function updateQty(v) {
            currentQty += v;
            if(currentQty < 1) currentQty = 1;
            if(currentQty > 10) currentQty = 10;
            document.getElementById('qtyVal').innerText = currentQty;
            calcTotal();
        }

        function calcTotal() {
            const topping = parseInt(document.getElementById('mTop').value);
            const total = (currentProduct.price + topping) * currentQty;
            document.getElementById('mTotal').innerText = "Rp " + total.toLocaleString();
        }

        function selectPayment(el, method) {
            document.querySelectorAll('.pay-option').forEach(opt => opt.classList.remove('selected'));
            el.classList.add('selected');
            selectedPayment = method;
        }

        function triggerPurchase() {
            const nama = document.getElementById('mNama').value;
            const alamat = document.getElementById('mAlamat').value;
            if(!nama || !alamat) return alert("Mohon isi Nama dan Alamat!");

            // Update stats pembelian
            let sold = parseInt(localStorage.getItem('sold_' + currentProduct.id)) || 0;
            sold += currentQty;
            localStorage.setItem('sold_' + currentProduct.id, sold);
            
            // Kirim WhatsApp
            const pedas = document.getElementById('mPedas').value;
            const topping = document.getElementById('mTop').options[document.getElementById('mTop').selectedIndex].text;
            const catatan = document.getElementById('mCatatan').value || "-";
            const total = document.getElementById('mTotal').innerText;

            const msg = `Halo Aneka Sosis!%0A*PESANAN BARU*%0A---------------------------%0A🌭 Produk: ${currentProduct.name}%0A🔢 Qty: ${currentQty}%0A🌶 Level: ${pedas}%0A🧀 Topping: ${topping}%0A📝 Catatan: ${catatan}%0A👤 Nama: ${nama}%0A📍 Alamat: ${alamat}%0A💳 Bayar: *${selectedPayment}*%0A💰 *Total: ${total}*%0A---------------------------`;
            
            window.open(`https://wa.me/6282143934463?text=${msg}`);
            closeModal();
            renderMenu(); // Refresh angka terjual
        }
    </script>
</body>
</html>
